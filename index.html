<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Onboarding | WIFARM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <div class="bg-white shadow-xl rounded-2xl overflow-hidden">
            <div class="bg-green-800 p-6 text-white">
                <h1 class="text-2xl font-bold">New Client Registration</h1>
                <p class="text-sm opacity-80">Wifarm Agronomics Uganda Limited - Security Verified Onboarding</p>
            </div>

            <form id="onboardForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Full Name (as per National ID)</label>
                        <input type="text" id="full_name" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700">National ID (NIN)</label>
                        <input type="text" id="nin" placeholder="CM..." required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Contact Number</label>
                        <input type="tel" id="contact_phone" placeholder="07..." required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Next of Kin Name</label>
                        <input type="text" id="nok_name" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                </div>

                <hr>

                <div>
                    <h3 class="text-lg font-bold text-green-800 mb-4">Security Verification: Three (3) Relatives</h3>
                    <div id="relatives-container" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-gray-50 rounded-lg border">
                            <input type="text" placeholder="Relative 1 Name" class="rel-name p-2 border rounded" required>
                            <input type="text" placeholder="Relationship" class="rel-relation p-2 border rounded" required>
                            <input type="tel" placeholder="Phone Number" class="rel-phone p-2 border rounded" required>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-gray-50 rounded-lg border">
                            <input type="text" placeholder="Relative 2 Name" class="rel-name p-2 border rounded" required>
                            <input type="text" placeholder="Relationship" class="rel-relation p-2 border rounded" required>
                            <input type="tel" placeholder="Phone Number" class="rel-phone p-2 border rounded" required>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-gray-50 rounded-lg border">
                            <input type="text" placeholder="Relative 3 Name" class="rel-name p-2 border rounded" required>
                            <input type="text" placeholder="Relationship" class="rel-relation p-2 border rounded" required>
                            <input type="tel" placeholder="Phone Number" class="rel-phone p-2 border rounded" required>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-xl transition shadow-lg">
                        Complete Registration & Sync to Cloud
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://your-worker-url.workers.dev/onboard"; // Update with your URL

        document.getElementById('onboardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Collect Relative Data
            const relNames = document.querySelectorAll('.rel-name');
            const relRelations = document.querySelectorAll('.rel-relation');
            const relPhones = document.querySelectorAll('.rel-phone');
            
            const relatives = [];
            for(let i=0; i<3; i++) {
                relatives.push({
                    name: relNames[i].value,
                    relation: relRelations[i].value,
                    phone: relPhones[i].value
                });
            }

            // Package the JSON payload
            const payload = {
                full_name: document.getElementById('full_name').value,
                nin: document.getElementById('nin').value,
                contact_phone: document.getElementById('contact_phone').value,
                nok_name: document.getElementById('nok_name').value,
                nok_phone: "N/A", // Can add field if needed
                relatives: relatives
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('wifarm_token')}`
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if(result.success) {
                    alert("Client Onboarded Successfully!");
                    window.location.href = "index.html";
                } else {
                    alert("Error: " + result.error);
                }
            } catch (err) {
                alert("Connection failed. Check your internet.");
            }
        });
    </script>
</body>
</html>
