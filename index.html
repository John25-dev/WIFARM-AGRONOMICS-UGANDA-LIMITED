<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIFARM AGRONOMICS | Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .wifarm-green { color: #2d5a27; }
        .bg-wifarm { background-color: #2d5a27; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-wifarm text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">WIFARM AGRONOMICS UGANDA LTD</h1>
            <div id="user-info" class="text-sm italic"></div>
            <button onclick="logout()" class="text-xs bg-red-600 px-3 py-1 rounded">Logout</button>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        
        <section class="mb-8">
            <div class="max-w-2xl mx-auto relative">
                <label class="block text-gray-700 font-bold mb-2">Search Area (Client, Plate, or Serial)</label>
                <input type="text" id="global-search" 
                       placeholder="Enter Name, Number Plate, or Serial Code..." 
                       class="w-full p-4 rounded-lg border-2 border-gray-300 focus:border-green-500 outline-none shadow-sm"
                       onkeyup="handleSearch(this.value)">
                
                <div id="search-results" class="absolute w-full mt-1 bg-white border rounded-lg shadow-xl hidden z-50">
                    </div>
            </div>
        </section>

        <hr class="my-8 border-gray-300">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-xl border-l-4 border-green-600 shadow-md">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Account Balance</h3>
                <p id="total-balance" class="text-3xl font-black wifarm-green">UGX 0</p>
            </div>

            <div class="glass p-6 rounded-xl border-l-4 border-red-600 shadow-md">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Total Arrears</h3>
                <p id="total-arrears" class="text-3xl font-black text-red-600">UGX 0</p>
            </div>

            <div class="glass p-6 rounded-xl border-l-4 border-blue-600 shadow-md">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Branch Sync Status</h3>
                <p id="sync-status" class="text-lg font-bold text-blue-800">Checking...</p>
            </div>
        </div>

    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 text-center text-gray-500 text-xs">
        &copy; 2026 Wifarm Agronomics Uganda Limited. All Rights Reserved.
    </footer>

    <script>
        const API_BASE = "https://your-worker-url.workers.dev"; // UPDATE THIS

        async function handleSearch(query) {
            const resultsBox = document.getElementById('search-results');
            if (query.length < 2) {
                resultsBox.classList.add('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/search`, {
                    headers: { 
                        'Authorization': `Bearer ${localStorage.getItem('wifarm_token')}`,
                        'X-Search-Query': query 
                    }
                });
                const data = await response.json();
                
                resultsBox.innerHTML = '';
                if (data.length > 0) {
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = "p-3 hover:bg-gray-100 cursor-pointer border-b flex justify-between";
                        div.innerHTML = `
                            <span><strong>${item.full_name || item.number_plate}</strong></span>
                            <span class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-600">${item.type}</span>
                        `;
                        div.onclick = () => loadClientDetails(item.id);
                        resultsBox.appendChild(div);
                    });
                    resultsBox.classList.remove('hidden');
                } else {
                    resultsBox.classList.add('hidden');
                }
            } catch (err) {
                console.error("Search failed", err);
            }
        }

        async function loadClientDetails(id) {
            // Logic to fetch client specific balance/arrears
            const resp = await fetch(`${API_BASE}/client-summary?id=${id}`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('wifarm_token')}` }
            });
            const data = await resp.json();
            document.getElementById('total-balance').innerText = `UGX ${data.balance.toLocaleString()}`;
            document.getElementById('total-arrears').innerText = `UGX ${data.arrears.toLocaleString()}`;
            document.getElementById('search-results').classList.add('hidden');
        }

        // Initialize Page
        window.onload = () => {
            const token = localStorage.getItem('wifarm_token');
            if (!token) window.location.href = "/login.html";
            document.getElementById('user-info').innerText = `Role: ${localStorage.getItem('wifarm_role')}`;
        };

        function logout() {
            localStorage.clear();
            window.location.reload();
        }
    </script>
</body>
</html>
